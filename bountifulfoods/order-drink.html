<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smoothie shop website">
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="./scripts/common.js" defer></script>
    <script src="./scripts/drink.js" defer></script>
    <script src="./scripts/confirmation.js" defer></script>
    <script src="./scripts/order.js" defer></script>
     <!--Box Icons-->
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'/>
    <title>Order Drink</title>
</head>
<!-- This styles the order drink page, putting it into the styles.css makes all of the pages follow the format 
  of this page and messes the other pages up. -->
<style>
  body {
      font-family: 'Arial', sans-serif;
      background-color: #f8f8f8;
      color: #333;
      margin: 0;
      padding: 0;
  }

  .main-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      margin-top: 20px;
  }

  form {
      display: grid;
      gap: 10px;
  }

  label {
      font-weight: bold;
  }

  input,
  select,
  textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
  }

  button {
      background-color: red;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
  }

  button:hover {
      background-color: red;
  }
</style>
<body>

  <!-- Header -->
  <header>
    <!-- Nav -->
    <nav class="nav container">
      <!-- Logo -->
      <a href="#" class="logo">Bountiful Foods</a>
      <!-- Navbar -->
      <div id="menu-toggle" class="menuicon">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      </div>
      <div class="navbar">
      <a href="./index.html" class="navlink">Home</a>
      <a href="./order-drink.html" class="navlink">Order Now</a>
      <a href="./about-us.html" class="navlink">About Us</a>
    </div>
  </nav>
  </div>

<!-- Main Content -->
<div class="main-content">
    <h1>Order Your Specialty Drink</h1>
    <form id="order-form">
      <!-- Form fields (first name, email, phone, fruit selection, special instructions) -->
      
      <!-- First Name -->
      <label for="first-name">First Name:</label>
      <input type="text" id="first-name" name="first-name" required>
  
      <!-- Email -->
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
  
      <!-- Phone -->
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" required>
  
     <!-- Fruit Selection -->
<label for="fruit-selection">Fruit Selection (Select up to 3):</label>
<input type="fruit" id="fruit-selection1" name="fruit-selection1" required>
<input type="fruit" id="fruit-selection2" name="fruit-selection2" required>
<input type="fruit" id="fruit-selection3" name="fruit-selection3" required>
<select id="fruit.json" name="fruit.json"> </select>
      <!-- Special Instructions -->
      <label for="special-instructions">Special Instructions:</label>
      <textarea id="special-instructions" name="special-instructions" rows="4"></textarea>
      <button type="submit">Submit Order</button>
    </form>
  </div>
  <footer>
    <div class="footer-content">
        <ul>
        </ul>
      </div>
      
      <!-- Social Media Links -->
      <div class="social"></div>
      <a href="https://www.facebook.com/"><i class='bx bxl-facebook-circle'></i></i></a>
      <a href="https://twitter.com/home"><i class='bx bxl-twitter' ></i></i></a>
      <a href="https://www.instagram.com/"><i class='bx bxl-instagram' ></i></i></a>
        
      </div>
      
      <!-- Contact Information -->
      <div class="contact-info">
        <p>Email: bountifulfoods@gmail.com</p>
        <p>Phone: (760) 998-6756</p>
        <p>Address: 822 Tamarack Ave, Carlsbad, CA</p>
      </div>
    </div>
    <!-- Last Modified Date -->
    <div id="last-modified"></div>
    
  </footer>
</body>
  </html>
